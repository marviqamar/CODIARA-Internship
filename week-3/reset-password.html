<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAnalytics | Reset Password</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="auth-page">
    <div class="auth-wrapper">
        <a href="index.html" class="auth-logo">
            <i class="fa-solid fa-chart-simple"></i> EduAnalytics
        </a>

        <!-- step 2 of the flow: set a new password -->
        <form class="login-form" id="resetPasswordForm" novalidate>
            <div class="lock-icon"><i class="fa-solid fa-lock-open"></i></div>
            <h2>Reset Your Password</h2>
            <p class="auth-subtitle">Enter a new password for your account.</p>

            <p class="form-message" id="resetMessage" hidden></p>

            <label>New Password
                <input type="password" id="resetNewPassword" name="newPassword" placeholder="Create a new password">
                <span class="field-error" id="resetNewPasswordError"></span>
            </label>
            <label>Confirm New Password
                <input type="password" id="resetConfirmPassword" name="confirmPassword" placeholder="Re-enter your new password">
                <span class="field-error" id="resetConfirmPasswordError"></span>
            </label>

            <button type="submit">Reset Password</button>

            <p class="auth-footer-text">Remembered your password? <a href="login.html">Log in</a></p>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
