<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAnalytics | Forgot Password</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        (function () {
            try {
                if (localStorage.getItem('eduAnalyticsTheme') === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            } catch (e) {}
        })();
    </script>
</head>
<body class="auth-page">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div class="auth-wrapper" id="main-content">
        <a href="index.html" class="auth-logo">
            <i class="fa-solid fa-chart-simple"></i> EduAnalytics
        </a>

        <!-- step 1 of the flow: request a reset link -->
        <form class="login-form" id="forgotPasswordForm" novalidate>
            <div class="lock-icon"><i class="fa-solid fa-key"></i></div>
            <h2>Forgot Your Password?</h2>
            <p class="auth-subtitle">Enter your email and we'll send you a link to reset it.</p>

            <p class="form-message" id="forgotMessage" hidden></p>

            <label>Email Address
                <input type="email" id="forgotEmail" name="email" placeholder="you@example.com">
                <span class="field-error" id="forgotEmailError"></span>
            </label>

            <button type="submit" id="forgotSubmitBtn">Send Reset Link</button>

            <!-- shown only after a simulated "email" is sent, since there's no real backend -->
            <a href="reset-password.html" class="btn-secondary-link" id="continueToResetLink" hidden>
                Continue to Reset Password &rarr;
            </a>

            <p class="auth-footer-text">Remembered your password? <a href="login.html">Log in</a></p>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
